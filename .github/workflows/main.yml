name: Main
on:
  workflow_dispatch:
  schedule:
    - cron:  '0 1 * * *'
  push:
    branches:
      - develop
      - main
      - beta
    paths-ignore:
      - 'mkdocs.yml'
      - '_docs/**'
  pull_request:
    branches-ignore:
      - main
    paths-ignore:
      - 'mkdocs.yml'
      - '_docs/**'

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  validate:
    if: ${{ github.repository_owner == 'RJN368' }}
    name: Validate
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4
      - uses: "home-assistant/actions/hassfest@master"
      - name: HACS Action
        uses: "hacs/action@main"
        with:
          category: "integration"
  unit_tests:
    if: ${{ github.event_name != 'schedule' || github.repository_owner == 'RJN368' }}
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python environment
        uses: ./.github/actions/setup-python
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: |
          python3 -m pytest tests/unit \
            --cov=custom_components/battery_charge_calculator \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: unit
  release:
    name: Release
    if: ${{ github.repository_owner == 'RJN368' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta') }}
    needs:
    - validate
    - unit_tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: asdf_install
        uses: asdf-vm/actions/install@v4
      - name: Install dependencies
        run: npm ci
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
      - name: Merge main into develop
        if: ${{ github.repository_owner == 'RJN368' && github.ref == 'refs/heads/main' }}
        uses: devmasx/merge-branch@master
        with:
          type: now
          message: "chore: Merged main into develop"
          from_branch: main
          target_branch: develop
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge main into beta
        if: ${{ github.repository_owner == 'RJN368' && github.ref == 'refs/heads/beta' }}
        uses: devmasx/merge-branch@master
        with:
          type: now
          message: "chore: Merged main into beta"
          from_branch: main
          target_branch: beta
          github_token: ${{ secrets.GITHUB_TOKEN }}
